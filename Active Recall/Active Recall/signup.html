<!DOCTYPE html>
<html>
<head>
<title>Sign Up</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="auth-container">

<h1>Create Account</h1>

<input id="name" placeholder="Name">

<select id="class">
<option value="">Select Class</option>
<option>Junior Secondary School 1</option>
<option>Junior Secondary School 2</option>
<option>Junior Secondary School 3</option>
<option>Senior Secondary School 1</option>
<option>Senior Secondary School 2</option>
<option>Senior Secondary School 3</option>
</select>

<input id="password" type="password" placeholder="Password">

<button onclick="signup()">Sign Up</button>

<p>Already have an account? <a href="index.html">Login</a></p>

</div>

<script src="js/auth.js"></script>

</body>
</html>
